<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leading Indicator Insights — Operations Observability</title>
<style>
:root{
  --plane:#f9f9f7; --surface:#fcfcfb; --surface-2:#f2f1ec;
  --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
  --hair:#e1e0d9; --border:rgba(11,11,11,0.10);
  --accent:#2a78d6; --accent-ink:#ffffff; --accent-soft:#e7f0fc;
  --ai:#4a3aa7; --ai-soft:#efeaff; --ai-ink:#ffffff;
  --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b; --warning-ink:#8a5a00;
  --good-soft:#e4f5e2; --warning-soft:#fff3d9; --serious-soft:#fde7dd; --critical-soft:#fbe3e3;
  --sparkline:#2a78d6;
  --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, "Cascadia Code", "SFMono-Regular", Consolas, monospace;
  --shadow: 0 1px 2px rgba(11,11,11,0.04), 0 4px 16px rgba(11,11,11,0.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --plane:#0d0d0d; --surface:#1a1a19; --surface-2:#232320;
    --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
    --hair:#2c2c2a; --border:rgba(255,255,255,0.10);
    --accent:#3987e5; --accent-ink:#ffffff; --accent-soft:#173154;
    --ai:#9085e9; --ai-soft:#241f47; --ai-ink:#0d0d0d;
    --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#e66767; --warning-ink:#fab219;
    --good-soft:#0f2a10; --warning-soft:#3a2c08; --serious-soft:#3a2013; --critical-soft:#3a1414;
    --sparkline:#3987e5;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
  }
}
:root[data-theme="dark"]{
  --plane:#0d0d0d; --surface:#1a1a19; --surface-2:#232320;
  --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
  --hair:#2c2c2a; --border:rgba(255,255,255,0.10);
  --accent:#3987e5; --accent-ink:#ffffff; --accent-soft:#173154;
  --ai:#9085e9; --ai-soft:#241f47; --ai-ink:#0d0d0d;
  --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#e66767; --warning-ink:#fab219;
  --good-soft:#0f2a10; --warning-soft:#3a2c08; --serious-soft:#3a2013; --critical-soft:#3a1414;
  --sparkline:#3987e5;
}
:root[data-theme="light"]{
  --plane:#f9f9f7; --surface:#fcfcfb; --surface-2:#f2f1ec;
  --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
  --hair:#e1e0d9; --border:rgba(11,11,11,0.10);
  --accent:#2a78d6; --accent-ink:#ffffff; --accent-soft:#e7f0fc;
  --ai:#4a3aa7; --ai-soft:#efeaff; --ai-ink:#ffffff;
  --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b; --warning-ink:#8a5a00;
  --good-soft:#e4f5e2; --warning-soft:#fff3d9; --serious-soft:#fde7dd; --critical-soft:#fbe3e3;
  --sparkline:#2a78d6;
}
*{box-sizing:border-box;}
body{margin:0;}
.app{
  font-family:var(--font); background:var(--plane); color:var(--ink);
  min-height:100vh; padding:28px clamp(16px,4vw,40px) 80px;
}
.wrap{max-width:1280px; margin:0 auto;}
h1,h2,h3,h4{text-wrap:balance; margin:0;}
button{font-family:inherit; cursor:pointer;}
button:focus-visible, [tabindex]:focus-visible, input:focus-visible, select:focus-visible{
  outline:2px solid var(--accent); outline-offset:2px;
}
::-webkit-scrollbar{height:10px; width:10px;}
::-webkit-scrollbar-thumb{background:var(--hair); border-radius:8px;}

/* ---------- Header ---------- */
.topbar{display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:22px;}
.title-block{display:flex; flex-direction:column; gap:4px;}
.eyebrow{font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:600;}
.title-row{display:flex; align-items:center; gap:10px;}
.title-row svg{color:var(--accent);}
.title-row h1{font-size:24px; font-weight:700; letter-spacing:-0.01em;}
.breadcrumb{font-size:13px; color:var(--ink-2); display:flex; align-items:center; gap:6px; margin-top:2px;}
.breadcrumb button{background:none; border:none; color:var(--accent); font-size:13px; padding:0; font-weight:600;}
.breadcrumb .sep{color:var(--muted);}
.breadcrumb .current{color:var(--ink); font-weight:600;}

.header-controls{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
.view-toggle{display:flex; background:var(--surface-2); border:1px solid var(--hair); border-radius:10px; padding:3px; gap:2px;}
.view-toggle button{
  border:none; background:transparent; color:var(--ink-2); font-size:13px; font-weight:600;
  padding:8px 14px; border-radius:8px; display:flex; align-items:center; gap:7px; transition:background .15s, color .15s;
}
.view-toggle button.active{background:var(--surface); color:var(--accent); box-shadow:var(--shadow);}
.view-toggle button svg{width:15px; height:15px;}

.btn{
  display:inline-flex; align-items:center; gap:8px; border-radius:9px; border:1px solid var(--border);
  padding:9px 15px; font-size:13px; font-weight:600; background:var(--surface); color:var(--ink);
  transition:transform .1s, background .15s;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn.primary{background:var(--accent); color:var(--accent-ink); border-color:transparent;}
.btn.ai{background:var(--ai); color:var(--ai-ink); border-color:transparent;}
.btn.ghost{background:transparent;}
.btn.small{padding:6px 11px; font-size:12px;}
.btn[disabled]{opacity:.45; cursor:not-allowed; transform:none;}
.btn svg{width:14px; height:14px; flex:none;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion: reduce){.spin{animation-duration:3s;}}

/* ---------- Executive summary ---------- */
.summary-band{
  background:linear-gradient(135deg, var(--accent), var(--ai));
  border-radius:16px; padding:26px 30px; color:#fff; margin-bottom:22px;
  display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
}
.summary-stats{display:flex; gap:clamp(20px,5vw,56px); flex-wrap:wrap;}
.stat{display:flex; flex-direction:column; gap:2px;}
.stat .n{font-size:34px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1;}
.stat .l{font-size:12.5px; opacity:.88; font-weight:600;}
.summary-meta{display:flex; flex-direction:column; align-items:flex-end; gap:8px;}
.summary-meta .updated{font-size:12px; opacity:.85; display:flex; align-items:center; gap:8px;}
.summary-meta .updated button{background:rgba(255,255,255,.18); border:none; color:#fff; border-radius:7px; width:26px; height:26px; display:flex; align-items:center; justify-content:center;}
.sweep-btn{background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.35); color:#fff; backdrop-filter:blur(2px);}
.sweep-btn:hover{background:rgba(255,255,255,.26);}

/* ---------- Executive layout ---------- */
.exec-grid{display:grid; grid-template-columns:250px 1fr; gap:20px; align-items:start;}
@media (max-width:820px){.exec-grid{grid-template-columns:1fr;}}
.panel{background:var(--surface); border:1px solid var(--hair); border-radius:14px; padding:18px;}
.panel h3{font-size:14px; font-weight:700; margin-bottom:14px;}
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:16px;}
.field label{font-size:11.5px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;}
.field .search{position:relative;}
.field .search svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); width:15px; height:15px;}
.field input[type="text"]{width:100%; padding:9px 10px 9px 30px; border-radius:8px; border:1px solid var(--hair); background:var(--surface-2); color:var(--ink); font-size:13px;}
.field select{width:100%; padding:9px 10px; border-radius:8px; border:1px solid var(--hair); background:var(--surface-2); color:var(--ink); font-size:13px;}
.seg{display:flex; border:1px solid var(--hair); border-radius:8px; overflow:hidden;}
.seg button{flex:1; border:none; background:var(--surface-2); color:var(--ink-2); font-size:12.5px; font-weight:600; padding:8px 0;}
.seg button.active{background:var(--accent); color:#fff;}
.reset-link{font-size:12px; color:var(--accent); background:none; border:none; font-weight:600; padding:0;}

.heatmap-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.heat-counts{display:flex; gap:22px; flex-wrap:wrap; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--hair);}
.heat-count{display:flex; flex-direction:column; gap:2px; min-width:64px;}
.heat-count .n{font-size:22px; font-weight:700; font-variant-numeric:tabular-nums;}
.heat-count .l{font-size:11.5px; color:var(--muted); font-weight:600;}
.heat-count.critical .n{color:var(--critical);}
.heat-count.warning .n{color:var(--warning-ink);}
.heat-count.good .n{color:var(--good);}
.count-tag{font-size:12px; color:var(--muted); font-weight:600;}

.product-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px;}
.product-grid.list-mode{grid-template-columns:1fr;}
.empty{padding:50px 10px; text-align:center; color:var(--muted); font-size:13.5px;}

.card{
  border:1px solid var(--hair); border-radius:13px; background:var(--surface);
  padding:16px; display:flex; flex-direction:column; gap:12px; position:relative; overflow:hidden;
}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px;}
.card.s-critical::before{background:var(--critical);}
.card.s-warning::before{background:var(--warning);}
.card.s-good::before{background:var(--good);}
.card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.card-id{font-family:var(--mono); font-size:11px; color:var(--muted);}
.card-name{font-size:15.5px; font-weight:700; margin-top:2px;}
.pill{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 9px; border-radius:999px; white-space:nowrap;}
.pill.s-critical{background:var(--critical-soft); color:var(--critical);}
.pill.s-warning{background:var(--warning-soft); color:var(--warning-ink);}
.pill.s-good{background:var(--good-soft); color:var(--good);}
.pill svg{width:11px; height:11px;}
.card-metrics{display:flex; gap:16px;}
.mini-metric{display:flex; flex-direction:column; gap:1px;}
.mini-metric .n{font-size:17px; font-weight:700; font-variant-numeric:tabular-nums;}
.mini-metric .l{font-size:10.5px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.03em;}
.mini-metric.crit .n{color:var(--critical);} .mini-metric.warn .n{color:var(--warning-ink);}
.card-spark{height:34px;}
.card-actions{display:flex; gap:8px; margin-top:2px;}
.card-actions .btn{flex:1; justify-content:center;}
.anomaly-flag{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ai); font-weight:600;}
.anomaly-flag svg{width:13px; height:13px;}

/* ---------- Detailed view ---------- */
.tabs-row{display:flex; gap:4px; border-bottom:1px solid var(--hair); margin-bottom:18px; flex-wrap:wrap;}
.tab{
  border:none; background:none; color:var(--ink-2); font-size:13.5px; font-weight:600; padding:11px 4px;
  display:flex; align-items:center; gap:7px; border-bottom:2px solid transparent; margin-right:22px;
}
.tab svg{width:16px; height:16px;}
.tab.active{color:var(--accent); border-color:var(--accent);}
.subtabs-row{display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;}
.subtab{border:1px solid var(--hair); background:var(--surface); color:var(--ink-2); font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:8px;}
.subtab.active{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}

.section-head{display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
.section-head h3{font-size:17px; font-weight:700;}
.badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.02em;}
.badge.live{background:var(--good-soft); color:var(--good);}
.badge.nocache{background:var(--warning-soft); color:var(--warning-ink);}
.icon-btn{border:1px solid var(--hair); background:var(--surface); border-radius:7px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; color:var(--ink-2);}
.icon-btn svg{width:14px; height:14px;}

.metric-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px;}
.metric-card{border:1px solid var(--hair); border-radius:12px; background:var(--surface); overflow:hidden;}
.metric-card-head{display:flex; align-items:center; justify-content:space-between; padding:13px 15px 0; gap:8px;}
.metric-title{font-size:12.5px; font-weight:600; color:var(--ink-2);}
.head-actions{display:flex; align-items:center; gap:6px; flex:none;}
.info-btn{border:none; background:var(--surface-2); color:var(--muted); width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex:none;}
.info-btn svg{width:13px; height:13px;}
.info-btn:hover{color:var(--accent); background:var(--accent-soft);}
.expand-chevron{width:16px; height:16px; color:var(--muted); transition:transform .18s; flex:none;}
.metric-card.open .expand-chevron{transform:rotate(90deg);}
.metric-body-row{display:flex; align-items:flex-end; justify-content:space-between; padding:6px 15px 10px; gap:10px;}
.metric-value-row{display:flex; align-items:baseline; gap:7px;}
.metric-value{font-size:26px; font-weight:700; font-variant-numeric:tabular-nums;}
.metric-value.s-critical{color:var(--critical);} .metric-value.s-warning{color:var(--warning-ink);} .metric-value.s-serious{color:var(--serious);} .metric-value.s-good{color:var(--ink);}
.metric-max{font-size:11.5px; color:var(--muted); font-weight:600;}
.metric-mini-spark{width:70px; height:26px; flex:none;}
.metric-card-btn{width:100%; background:none; border:none; text-align:left; display:block; padding:0; cursor:pointer;}
.metric-detail{max-height:0; overflow:hidden; transition:max-height .22s ease;}
.metric-card.open .metric-detail{max-height:420px; overflow-y:auto;}
.metric-detail-inner{padding:4px 15px 16px; border-top:1px solid var(--hair); margin-top:6px;}
.detail-chart{width:100%; height:80px; margin:10px 0 6px;}
.log-title{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:10px 0 6px;}
.res-list{display:flex; flex-direction:column; gap:0;}
.res-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px dashed var(--hair); font-family:var(--mono); font-size:12px;}
.res-row:last-child{border-bottom:none;}
.res-name{color:var(--ink); font-weight:600;}
.res-tag{color:var(--ink-2); font-size:11.5px; text-align:right;}
.res-val{color:var(--ink-2); font-weight:700; font-variant-numeric:tabular-nums;}
.res-val.over{color:var(--critical);}
.res-more{font-size:11.5px; color:var(--muted); margin-top:8px; font-style:italic;}
.res-empty{font-size:12.5px; color:var(--muted); padding:6px 0;}

.info-pop{max-height:0; overflow:hidden; transition:max-height .2s ease; margin:0 15px;}
.info-pop.open{max-height:260px; margin-top:2px; margin-bottom:8px;}
.info-pop-desc{font-size:12px; color:var(--ink-2); line-height:1.4; padding-top:8px;}
.info-pop-label{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--ai); margin-top:8px;}
.info-pop-query{font-family:var(--mono); font-size:11px; color:var(--ink); background:var(--surface-2); border:1px solid var(--hair); border-radius:8px; padding:8px 10px; margin:5px 0 0; white-space:pre-wrap; word-break:break-word; line-height:1.5;}
.info-pop-threshold{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--warning-ink); font-weight:600; margin-top:7px;}
.info-pop-threshold svg{width:12px; height:12px; flex:none;}

/* ---------- Product details popup ---------- */
.modal-overlay{position:fixed; inset:0; background:rgba(11,11,11,.42); z-index:30; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; animation:fadein .18s ease forwards;}
@keyframes fadein{to{opacity:1;}}
.product-modal{background:var(--surface); border-radius:16px; width:min(920px,100%); max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); border:1px solid var(--hair);}
.modal-head{position:sticky; top:0; background:var(--surface); z-index:1; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:20px 24px; border-bottom:1px solid var(--hair);}
.modal-body{padding:20px 24px 26px;}

/* ---------- AI Drawer ---------- */
.overlay{position:fixed; inset:0; background:rgba(11,11,11,.42); z-index:40; opacity:0; pointer-events:none; transition:opacity .2s;}
.overlay.show{opacity:1; pointer-events:auto;}
.drawer{
  position:fixed; top:0; right:0; height:100%; width:min(460px,92vw); background:var(--surface);
  border-left:1px solid var(--hair); z-index:41; transform:translateX(100%); transition:transform .26s ease;
  display:flex; flex-direction:column; box-shadow:-8px 0 30px rgba(0,0,0,.15);
}
.drawer.show{transform:translateX(0);}
.drawer-head{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:20px 20px 14px; border-bottom:1px solid var(--hair);}
.drawer-head .ai-tag{display:flex; align-items:center; gap:7px; color:var(--ai); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
.drawer-head .ai-tag svg{width:15px; height:15px;}
.drawer-head h3{font-size:17px; font-weight:700; margin-top:4px;}
.drawer-head .sub{font-size:12px; color:var(--muted); margin-top:2px;}
.drawer-close{border:none; background:var(--surface-2); width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--ink-2); flex:none;}
.drawer-body{flex:1; overflow-y:auto; padding:18px 20px 24px;}

.scan-list{display:flex; flex-direction:column; gap:10px; margin:6px 0 18px;}
.scan-item{display:flex; align-items:center; gap:11px; padding:10px 12px; border:1px solid var(--hair); border-radius:10px; background:var(--surface-2); opacity:0; transform:translateY(4px); transition:opacity .3s, transform .3s;}
.scan-item.show{opacity:1; transform:translateY(0);}
.scan-icon{width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex:none; background:var(--surface); color:var(--muted); border:1px solid var(--hair);}
.scan-item.done .scan-icon{background:var(--good-soft); color:var(--good); border-color:transparent;}
.scan-item.flag .scan-icon{background:var(--critical-soft); color:var(--critical); border-color:transparent;}
.scan-icon svg{width:14px; height:14px;}
.scan-text{display:flex; flex-direction:column; gap:1px; min-width:0;}
.scan-text .n{font-size:13px; font-weight:700;}
.scan-text .d{font-size:11.5px; color:var(--ink-2); font-family:var(--mono);}
.stage-label{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:8px;}
.stage-label svg{width:14px; height:14px;}

.result-card{border:1px solid var(--hair); border-radius:12px; padding:16px; margin-bottom:14px; background:var(--surface-2);}
.result-card h4{font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:7px;}
.confidence-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.confidence-bar{flex:1; height:7px; background:var(--hair); border-radius:99px; overflow:hidden;}
.confidence-fill{height:100%; background:var(--ai); border-radius:99px;}
.confidence-num{font-size:13px; font-weight:700; color:var(--ai); font-variant-numeric:tabular-nums;}
.root-cause-text{font-size:14px; line-height:1.55; color:var(--ink);}
.evidence-item{display:flex; gap:10px; padding:9px 0; border-bottom:1px dashed var(--hair);}
.evidence-item:last-child{border-bottom:none;}
.evidence-time{font-family:var(--mono); font-size:11px; color:var(--muted); flex:none; width:52px; padding-top:1px;}
.evidence-text{font-size:12.8px; color:var(--ink-2); line-height:1.45;}
.evidence-text b{color:var(--ink);}
.action-item{display:flex; gap:10px; align-items:flex-start; padding:8px 0;}
.action-check{width:18px; height:18px; border-radius:5px; border:1.5px solid var(--ai); flex:none; margin-top:1px; display:flex; align-items:center; justify-content:center; color:var(--ai);}
.action-check svg{width:12px; height:12px;}
.action-text{font-size:13px; color:var(--ink); line-height:1.4;}
.drawer-footer{display:flex; gap:10px; padding:14px 20px 20px; border-top:1px solid var(--hair);}
.drawer-footer .btn{flex:1; justify-content:center;}
.toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--plane);

/* ================= Seeded RNG ================= */
function hash(str){ let h=1779033703^str.length; for(let i=0;i<str.length;i++){ h=Math.imul(h^str.charCodeAt(i),3432918353); h=h<<13|h>>>19; } return ()=>{ h=Math.imul(h^(h>>>16),2246822507); h=Math.imul(h^(h>>>13),3266489909); h^=h>>>16; return (h>>>0)/4294967296; }; }
function seeded(str){ const r=hash(str); return ()=>r(); }
function walk(seedStr, n, base, vol, trendUp){
  const rnd = seeded(seedStr); let v = base; const out=[];
  for(let i=0;i<n;i++){
    const drift = trendUp ? (i/n)*trendUp : 0;
    v = v + (rnd()-0.5)*vol + drift/n;
    out.push(Math.max(0, v));
  }
  return out;
}

function slug(s){ return s.toLowerCase().replace(/\s+/g,'_'); }

function statusFromRatio(r, wStatusProduct){
  // baseline distribution biased by the product's overall status
  if (wStatusProduct==='good') return r>0.93?'warning':'good';
  if (wStatusProduct==='warning') return r>0.95?'serious':(r>0.85?'warning':'good');
  return r>0.9?'critical':(r>0.78?'serious':(r>0.6?'warning':'good'));
}

function getMetric(product, compKey, subtab, metricDef){
  const [name, unit, max] = metricDef;
  const key = `${product.id}|${compKey}|${subtab}|${name}`;
  const rnd = seeded(key);
  const r = rnd();
  const ov = OVERRIDES[key];
  let status = ov ? ov.status : statusFromRatio(r, product.status);
  let value;
  if (ov) value = ov.value;
  else {
    const ratio = status==='critical'?0.82+r*0.16:status==='serious'?0.66+r*0.15:status==='warning'?0.4+r*0.2:0.05+r*0.3;
    value = unit==='%'? Math.round(ratio*100) : Math.round(ratio*max);
  }
  const spark = walk(key+'-spark', 14, value*0.55, Math.max(value*0.12,1), ov?ov.trendUp:(status==='critical'?value*0.4:status==='serious'?value*0.25:0));
  spark.push(value);
  return {name, unit, max, value, status, spark};
}

/* ================= Sparkline SVG ================= */
function sparkSvg(data, w, h, color, opts){
  opts = opts||{};
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max-min)||1;
  const step = w/(data.length-1);
  const pts = data.map((v,i)=>[i*step, h - ((v-min)/range)*(h*0.82) - h*0.09]);
  const line = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area = line + ` L${w},${h} L0,${h} Z`;
  const last = pts[pts.length-1];
  const gid = 'g'+Math.random().toString(36).slice(2,9);

    list = list.filter(p=>p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q));
  }
  if (f.status!=='all') list = list.filter(p=>p.status===f.status);
  const dir = f.order==='desc'?-1:1;
  list.sort((a,b)=>{
    let av,bv;
    if (f.sortBy==='critical'){ av=a.critical; bv=b.critical; }
    else if (f.sortBy==='warning'){ av=a.warning; bv=b.warning; }
    else { av=a.name; bv=b.name; return dir*av.localeCompare(bv); }
    return dir*(av-bv);
  });
  return list;
}

function resourceRows(product, compKey, subtab, metric){
  const pool = (RESOURCE_POOLS[compKey] && RESOURCE_POOLS[compKey][subtab]) || [subtab+'-01'];
  const seedBase = product.id+'|'+compKey+'|'+subtab+'|'+metric.name;
  if (COUNT_METRICS.has(metric.name)){
    const n = Math.max(0, Math.min(Math.round(metric.value), pool.length));
    const order = pool.map(name=>({name, k:seeded(seedBase+name)()})).sort((a,b)=>b.k-a.k).map(x=>x.name);
    const picked = order.slice(0, n);
    return {isCount:true, rows: picked.map(name=>({name, tag: COUNT_TAGS[metric.name]||'threshold breached'})), overflow: Math.max(0, Math.round(metric.value)-picked.length)};
  }
  const rows = pool.map(name=>{
    const variance = (seeded(seedBase+name)()-0.5)*0.35;
    const val = Math.max(0, Math.round((metric.value*(1+variance))*10)/10);
    return {name, value:val};
  }).sort((a,b)=>b.value-a.value).slice(0,6);
  return {isCount:false, rows, overflow:0};
}

function metricDetailBody(metric, compKey, subtab, product){
  const {isCount, rows, overflow} = resourceRows(product, compKey, subtab, metric);
  if (rows.length===0){
    return `<div class="log-title">${isCount?'Affected Resources':'Resource Breakdown'}</div><div class="res-empty">No individual resources breaching — metric nominal.</div>`;
  }
  if (isCount){
    return `<div class="log-title">Affected Resources (${Math.round(metric.value)})</div>
    <div class="res-list">
      ${rows.map(r=>`<div class="res-row"><span class="res-name">${r.name}</span><span class="res-tag">${r.tag}</span></div>`).join('')}
    </div>
    ${overflow>0?`<div class="res-more">+${overflow} more instance${overflow===1?'':'s'} breaching beyond listed inventory</div>`:''}`;
  }
  return `<div class="log-title">Resource Breakdown</div>
  <div class="res-list">
    ${rows.map(r=>{
      const over = r.value >= metric.value*0.9;
      return `<div class="res-row"><span class="res-name">${r.name}</span><span class="res-val ${over?'over':''}">${r.value}${metric.unit}</span></div>`;
    }).join('')}
  </div>`;
}

function runScanStage(kase, gen){
  const stage = document.getElementById('drawer-stage');

  document.getElementById('drawer-footer').innerHTML = '';

  drawerTimers.push(setTimeout(()=>{ if (gen===drawerGen) runCorrelateStage(kase, gen); }, 260*(items.length+1)+500));

/* Generic (data-driven) case: works for any product by scanning every component/
   subtab/metric combination and reasoning about whichever is actually elevated,
   rather than a canned message. PRD-1042 / PRD-2071 keep their hand-authored
   flagship narratives above; every other product routes through here. */
const STATUS_RANK = {good:0, warning:1, serious:2, critical:3};
function metricDisplay(m){ return m.unit==='%' ? m.value+'%' : m.value+(m.unit?(' '+m.unit):''); }
function scanAllMetrics(product){
  const out = [];
  CAT_ORDER.forEach(compKey=>{
    const def = COMPONENTS[compKey];
    def.subtabs.forEach(subtab=>{
      def.metrics.forEach(mdef=>{
        out.push({compKey, subtab, metric:getMetric(product, compKey, subtab, mdef)});
      });
    });
  });
  return out;
}
const GENERIC_ACTIONS = {
  compute: (sub,m)=>[
    `Investigate resource utilization on <b>${sub}</b> — consider scaling out or right-sizing the tier`,
    `Correlate ${m.name.toLowerCase()} against recent deploys or scheduled batch jobs on ${sub}`,
    `Lower the alert threshold for ${m.name} on ${sub} so this is caught earlier next time`,
  ],
  network: (sub,m)=>[
    `Inspect load balancer health checks and upstream latency on <b>${sub}</b>`,
    `Check for a recent config or certificate change affecting ${sub}`,
    `Review the ${m.name.toLowerCase()} alert threshold for ${sub}`,
  ],
  database: (sub,m)=>[
    `Review slow query logs and connection pool sizing on <b>${sub}</b>`,
    `Check for lock contention or a missing index driving ${m.name.toLowerCase()} on ${sub}`,
    `Consider read-replica offload if the load on ${sub} is read-heavy`,
  ],
  middleware: (sub,m)=>[
    `Check consumer throughput and dead-letter queue growth on <b>${sub}</b>`,
    `Verify downstream service health — a slow consumer often shows up first as ${m.name.toLowerCase()} on ${sub}`,
    `Add backpressure or autoscale the consumer group for ${sub}`,
  ],
  kubernetes: (sub,m)=>[
    `Check pod restart and OOM events on <b>${sub}</b>, and adjust resource limits if needed`,
    `Review the most recent deployment to ${sub} for a possible regression`,
    `Set a PodDisruptionBudget alert tied to ${m.name.toLowerCase()} on ${sub}`,
  ],
};

function genericCase(product){
  const all = scanAllMetrics(product);
  const byComp = {};
  CAT_ORDER.forEach(c=>{ byComp[c] = null; });
  all.forEach(r=>{
    const cur = byComp[r.compKey];
    if (!cur || STATUS_RANK[r.metric.status] > STATUS_RANK[cur.metric.status]) byComp[r.compKey] = r;
  });
  const scan = CAT_ORDER.map(c=>{
    const best = byComp[c];
    const flag = best.metric.status !== 'good';
    return {
      comp:c, label:COMPONENTS[c].label,
      detail: `${best.metric.name} at ${metricDisplay(best.metric)} on ${best.subtab}${flag?` — ${best.metric.status}`:', nominal'}`,
      flag,
    };
  });

  const flagged = all.filter(r=>r.metric.status!=='good')
    .sort((a,b)=> STATUS_RANK[b.metric.status]-STATUS_RANK[a.metric.status] || b.metric.value-a.metric.value);

  if (flagged.length===0){
    return {
      title: product.name,
      scan,
      confidence: 60,
      rootCause: `No dominant anomaly signature found across ${product.name}'s components — every metric scanned is within its normal operating range.`,
      evidence: [{time:nowStr().slice(0,5), text:'All components report nominal status'}],
      actions: ['No action required — continue standard monitoring cadence'],
    };
  }

  const worst = flagged[0];
  const worstLabel = COMPONENTS[worst.compKey].label;
  const others = flagged.slice(1,4);
  const confidence = worst.metric.status==='critical'?93:worst.metric.status==='serious'?83:72;

  const rootCause = `The strongest signal for <b>${product.name}</b> is <b>${worst.metric.name}</b> at <b>${metricDisplay(worst.metric)}</b> on the ${worst.subtab} tier within <b>${worstLabel}</b> — a ${worst.metric.status} reading, above its normal operating range.` +
    (others.length
      ? ` This coincides with ${flagged.length-1} other elevated metric${flagged.length-1===1?'':'s'} (${others.map(o=>`${o.metric.name} on ${COMPONENTS[o.compKey].label}`).join(', ')}), consistent with load or resource pressure propagating across tiers.`
      : ` No other components show a correlated signal, which suggests an isolated condition rather than a cascading failure.`);

  const timeLabels = ['-18m','-12m','-6m','Now'];
  const evidencePool = [worst, ...others];
  const evidence = evidencePool.map((f,i)=>({
    time: timeLabels[Math.min(i, timeLabels.length-1)],
    text: `<b>${f.metric.name}</b> on ${COMPONENTS[f.compKey].label} / ${f.subtab} at ${metricDisplay(f.metric)} (${f.metric.status})`,
  }));

  const actionFn = GENERIC_ACTIONS[worst.compKey] || GENERIC_ACTIONS.compute;
  const actions = actionFn(worst.subtab, worst.metric);

  return { title: product.name, scan, confidence, rootCause, evidence, actions };
}

let toastTimer=null;
function showToast(html){
  const t = document.getElementById('toast');
  t.innerHTML = html;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
function createIncident(title){
  const num = 2200+Math.floor(seeded(title+'inc')()*90);
  showToast(ic('check')+` Incident INC-${num} created for ${title}`);
}

/* ================= Init ================= */
function render(){
  document.getElementById('root').innerHTML = renderHeader() + (state.view==='executive' ? renderExecutive() : renderDetailed());
  document.getElementById('modal-root').innerHTML = renderModal();
}
document.addEventListener('keydown', e=>{
  if (e.key!=='Escape') return;
  if (document.getElementById('drawer').classList.contains('show')) closeDrawer();
  else if (state.modal.open) closeProductModal();
});
render();
